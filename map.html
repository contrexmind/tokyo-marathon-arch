const selected = [];    // ordered idx list

function dotIcon(cat, big){
  return L.divIcon({ className:"", iconSize:big?[18,18]:[14,14], iconAnchor:big?[9,9]:[7,7],
    html:`<div class="pin pin-dot ${big?'pin-big':''}" style="background:${COLORS[cat]}"></div>` });
}
function starIcon(cat, seq){
  return L.divIcon({ className:"", iconSize:[28,28], iconAnchor:[14,14],
    html:`<div class="pin pin-star" style="color:${COLORS[cat]}">★<span class="seq">${seq}</span></div>` });
}

P.forEach((p, idx) => {
  const [lat,lng,name,arch,area,cat,links,fes] = p;
  if (counts[cat] !== undefined) counts[cat]++;
  bounds.push([lat,lng]);
  const big = (cat==="start"||cat==="goal");
  const m = L.marker([lat,lng], { icon: dotIcon(cat, big) }).addTo(map);
  let html = `<b>${name}</b><br><span class="pop-arch">${arch}</span><br><span class="pop-area">${area}</span>`;
  if (links && links.length) {
    html += `<div class="pop-links">` + links.map(l=>`<a href="${l[1]}" target="_blank">${l[0]} 記事</a>`).join("") + `</div>`;
  }
  if (fes) html += `<div class="pop-fes">🎪 ${fes}</div>`;
  m.bindPopup(html);
  m.on("click", ()=> toggle(idx));
  markers.push({ idx, m, cat, name, lat, lng, big });
});

function toggle(idx){
  const pos = selected.indexOf(idx);
  if (pos === -1) selected.push(idx); else selected.splice(pos,1);
  refresh();
}

function haversine(a,b){
  const R=6371000, toR=x=>x*Math.PI/180;
  const dLat=toR(b.lat-a.lat), dLng=toR(b.lng-a.lng);
  const s=Math.sin(dLat/2)**2 + Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}

let courseLine = null;
function refresh(){
  markers.forEach(o=>{
    const seq = selected.indexOf(o.idx);
    o.m.setIcon(seq===-1 ? dotIcon(o.cat, o.big) : starIcon(o.cat, seq+1));
    o.m.setZIndexOffset(seq===-1 ? 0 : 1000);
  });
  const latlngs = selected.map(i=>{ const o=markers.find(m=>m.idx===i); return [o.lat,o.lng]; });
  if (courseLine){ courseLine.remove(); courseLine=null; }
  if (latlngs.length>=2) courseLine = L.polyline(latlngs, {color:"#e11d2c", weight:4, opacity:.85}).addTo(map);
  renderList();
}

function renderList(){
  const wrap = document.getElementById("course");
  const dist = document.getElementById("dist");
  if (!selected.length){
    wrap.innerHTML = '<p class="empty">ピンをクリックして<br>コースに追加してください</p>';
    dist.innerHTML = ""; return;
  }
  let total=0, rows="";
  selected.forEach((idx,i)=>{
    const o = markers.find(m=>m.idx===idx);
    let leg=0;
    if (i>0){ const prev=markers.find(m=>m.idx===selected[i-1]); leg=haversine(prev,o); total+=leg; }
    rows += `<li draggable="true" data-i="${i}">
      <span class="seq2" style="background:${COLORS[o.cat]}">${i+1}</span>
      <span class="nm">${o.name}</span>
      <span class="leg">${i>0?('+'+(leg/1000).toFixed(2)+'km'):'START'}</span>
      <span class="ord"><button class="up" data-i="${i}">▲</button><button class="dn" data-i="${i}">▼</button></span>
      <button class="rm" data-idx="${idx}">×</button></li>`;
  });
  wrap.innerHTML = `<ol id="clist">${rows}</ol>`;
  const walk = total*1.25;
  dist.innerHTML = `<div class="big">${(walk/1000).toFixed(1)} <small>km</small></div>
     <div class="sub2">直線 ${(total/1000).toFixed(1)}km × 道路係数1.25 ／ ${selected.length}スポット</div>`;
  bindList();
}

function bindList(){
  document.querySelectorAll(".rm").forEach(b=>{
    b.onclick=(e)=>{ e.stopPropagation(); toggle(parseInt(b.dataset.idx)); };
  });
  document.querySelectorAll("#clist .nm").forEach((el,k)=>{
    el.onclick=()=>{ const o=markers.find(m=>m.idx===selected[k]); map.panTo([o.lat,o.lng]); o.m.openPopup(); };
  });
  document.querySelectorAll(".up").forEach(b=>{
    b.onclick=(e)=>{ e.stopPropagation(); const i=parseInt(b.dataset.i);
      if(i>0){ [selected[i-1],selected[i]]=[selected[i],selected[i-1]]; refresh(); } };
  });
  document.querySelectorAll(".dn").forEach(b=>{
    b.onclick=(e)=>{ e.stopPropagation(); const i=parseInt(b.dataset.i);
      if(i<selected.length-1){ [selected[i+1],selected[i]]=[selected[i],selected[i+1]]; refresh(); } };
  });
  let dragI=null;
  document.querySelectorAll("#clist li").forEach(li=>{
    li.addEventListener("dragstart",()=>{ dragI=parseInt(li.dataset.i); li.classList.add("dragging"); });
    li.addEventListener("dragend",()=>{ li.classList.remove("dragging"); });
    li.addEventListener("dragover",e=>e.preventDefault());
    li.addEventListener("drop",e=>{
      e.preventDefault();
      const dropI=parseInt(li.dataset.i);
      if (dragI===null || dragI===dropI) return;
      const it=selected.splice(dragI,1)[0];
      selected.splice(dropI,0,it);
      refresh();
    });
  });
}

document.getElementById("clear").onclick = ()=>{ selected.length=0; refresh(); };

document.getElementById("c-landmark").textContent = `(${counts.landmark})`;
document.getElementById("c-media").textContent = `(${counts.media})`;
document.getElementById("c-festival").textContent = `(${counts.festival})`;
document.getElementById("c-kuma").textContent = `(${counts.kuma})`;
map.fitBounds(bounds, { padding:[40,40] });
refresh();
</script>
</body>
</html>
